  <rect x="116" y="142" width="80" height="8" rx="4" fill="#5B5BE1" opacity="0.5"/>
  <rect x="116" y="158" width="120" height="8" rx="4" fill="#5B5BE1" opacity="0.4"/>
  <rect x="116" y="174" width="60" height="8" rx="4" fill="#5B5BE1" opacity="0.4"/>
