    <!-- Eyes -->
    <circle cx="38" cy="40" r="2.5" fill="white"/>
    <circle cx="50" cy="40" r="2.5" fill="white"/>
    <!-- Sad mouth -->
    <path d="M37 52 Q44 47 51 52" stroke="white" strokeWidth="2" fill="none" strokeLinecap="round"/>
    <!-- NO DATA text -->
    <rect x="10" y="70" width="68" height="8" rx="3" fill="#53F2AA" opacity="0.7"/>
    <rect x="20" y="82" width="48" height="6" rx="3" fill="#CAD2F9" opacity="0.5"/>
