  <path d="M147 6H141V0H137V6H131V10H137V16H141V10H147V6Z" fill="#CAD2F9"/>
  <path d="M18 267H14V263H11V267H7V270H11V274H14V270H18V267Z" fill="#CAD2F9"/>

  <!-- Left leaf decoration -->
  <ellipse cx="52" cy="268" rx="30" ry="12" transform="rotate(-35 52 268)" fill="#5B5BE1" opacity="0.4"/>
  <ellipse cx="40" cy="278" rx="22" ry="8" transform="rotate(-35 40 278)" fill="#5B5BE1" opacity="0.3"/>
  <line x1="52" y1="255" x2="42" y2="285" stroke="#5B5BE1" strokeWidth="1.5" opacity="0.5"/>

