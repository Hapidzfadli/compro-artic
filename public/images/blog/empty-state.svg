    <circle cx="36" cy="65" r="16" fill="#2020D3" opacity="0.6"/>
    <line x1="28" y1="57" x2="44" y2="73" stroke="white" strokeWidth="3" strokeLinecap="round"/>
    <line x1="44" y1="57" x2="28" y2="73" stroke="white" strokeWidth="3" strokeLinecap="round"/>
  </g>

