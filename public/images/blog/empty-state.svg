    <line x1="46" y1="26" x2="26" y2="46" stroke="white" strokeWidth="3.5" strokeLinecap="round"/>
  </g>

  <!-- NO DATA document bottom left -->
  <g transform="translate(105, 205)">
    <rect width="88" height="100" rx="6" fill="#2020D3"/>
    <!-- Folded corner -->
    <path d="M62 0 L88 26 L62 26 Z" fill="#161694"/>
    <path d="M62 0 L88 26 L62 26 Z" fill="none" stroke="#5B5BE1" strokeWidth="0.5"/>
