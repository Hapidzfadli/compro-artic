  <rect x="100" y="60" width="241" height="180" rx="10" fill="#161694"/>
  <rect x="100" y="60" width="241" height="18" rx="10" fill="#2020D3"/>
  <!-- Title bar dots -->
  <circle cx="116" cy="69" r="4" fill="#53F2AA" opacity="0.7"/>
  <circle cx="130" cy="69" r="4" fill="#CAD2F9" opacity="0.5"/>
  <circle cx="144" cy="69" r="4" fill="#CAD2F9" opacity="0.5"/>
  <!-- Screen content -->
  <rect x="116" y="95" width="209" height="32" rx="6" fill="#2020D3" opacity="0.6"/>
  <!-- Search icon in bar -->
  <circle cx="133" cy="111" r="8" stroke="#CAD2F9" strokeWidth="2" fill="none" opacity="0.7"/>
  <line x1="139" y1="117" x2="143" y2="121" stroke="#CAD2F9" strokeWidth="2" strokeLinecap="round" opacity="0.7"/>
  <!-- Dots in search bar -->
  <circle cx="155" cy="111" r="3" fill="#CAD2F9" opacity="0.5"/>
  <circle cx="165" cy="111" r="3" fill="#CAD2F9" opacity="0.5"/>
  <circle cx="175" cy="111" r="3" fill="#CAD2F9" opacity="0.5"/>
