  <rect x="185" y="255" width="71" height="8" rx="4" fill="#2020D3"/>

  <!-- Gear icon top right -->
  <g transform="translate(310, 40)">
    <circle cx="20" cy="20" r="12" fill="none" stroke="#5B5BE1" strokeWidth="3"/>
    <circle cx="20" cy="20" r="6" fill="#5B5BE1" opacity="0.6"/>
    <!-- Gear teeth -->
    <rect x="18" y="4" width="4" height="8" rx="2" fill="#5B5BE1"/>
    <rect x="18" y="28" width="4" height="8" rx="2" fill="#5B5BE1"/>
    <rect x="4" y="18" width="8" height="4" rx="2" fill="#5B5BE1"/>
    <rect x="28" y="18" width="8" height="4" rx="2" fill="#5B5BE1"/>
    <rect x="7" y="7" width="4" height="8" rx="2" transform="rotate(45 9 11)" fill="#5B5BE1"/>
    <rect x="27" y="7" width="4" height="8" rx="2" transform="rotate(-45 29 11)" fill="#5B5BE1"/>
    <rect x="7" y="25" width="4" height="8" rx="2" transform="rotate(-45 9 29)" fill="#5B5BE1"/>
    <rect x="27" y="25" width="4" height="8" rx="2" transform="rotate(45 29 29)" fill="#5B5BE1"/>
