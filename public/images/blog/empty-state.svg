  <ellipse cx="410" cy="280" rx="22" ry="8" transform="rotate(35 410 280)" fill="#5B5BE1" opacity="0.3"/>
  <line x1="398" y1="257" x2="408" y2="287" stroke="#5B5BE1" strokeWidth="1.5" opacity="0.5"/>

