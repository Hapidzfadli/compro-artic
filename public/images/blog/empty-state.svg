    <rect x="8" y="12" width="56" height="6" rx="3" fill="#CAD2F9"/>
    <rect x="8" y="26" width="40" height="6" rx="3" fill="#CAD2F9"/>
    <rect x="8" y="40" width="48" height="6" rx="3" fill="#CAD2F9"/>
    <!-- X mark -->
    <circle cx="36" cy="65" r="16" fill="#2020D3" opacity="0.85"/>
    <line x1="28" y1="57" x2="44" y2="73" stroke="white" strokeWidth="3" strokeLinecap="round"/>
    <line x1="44" y1="57" x2="28" y2="73" stroke="white" strokeWidth="3" strokeLinecap="round"/>
  </g>

  <!-- Right tilted document (X mark) -->
  <g transform="translate(340, 85) rotate(12)">
    <rect width="72" height="90" rx="6" fill="#E8EAFF"/>
    <rect x="8" y="12" width="56" height="6" rx="3" fill="#CAD2F9"/>
    <rect x="8" y="26" width="40" height="6" rx="3" fill="#CAD2F9"/>
    <rect x="8" y="40" width="48" height="6" rx="3" fill="#CAD2F9"/>
