    <circle cx="20" cy="22" r="10" fill="#161694"/>
    <line x1="16" y1="18" x2="24" y2="26" stroke="white" strokeWidth="2" strokeLinecap="round"/>
    <line x1="24" y1="18" x2="16" y2="26" stroke="white" strokeWidth="2" strokeLinecap="round"/>
    <rect x="34" y="16" width="18" height="4" rx="2" fill="#CAD2F9" opacity="0.6"/>
    <rect x="34" y="24" width="12" height="4" rx="2" fill="#CAD2F9" opacity="0.4"/>
  </g>
